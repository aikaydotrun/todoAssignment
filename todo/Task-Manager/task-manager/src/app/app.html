<div class="max-w-[1400px] mx-auto">
  <h1 class="text-3xl font-bold text-center p-4">Task Manager</h1>

  <div class="flex flex-col lg:flex-row gap-8 px-4 w-full">
    <!-- Form on the Left Side -->
    <div class="w-full lg:w-1/3 xl:w-1/4">
      <app-task-form></app-task-form>
    </div>

    <!-- Lists on the Right Side -->
    <div class="w-full lg:w-2/3 xl:w-3/4">
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <app-task-list [tasks]="todoItems()" class="min-w-0" [heading]="'Todo'"></app-task-list>
        <app-task-list [tasks]="inProgress()" class="min-w-0" [heading]="'In Progress'"></app-task-list>
        <app-task-list [tasks]="completed()" class="min-w-0" [heading]="'Completed'"></app-task-list>
      </div>
    </div>
  </div>

</div>
